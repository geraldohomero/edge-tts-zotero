<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <!-- Voice selector -->
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-voice"
      data-l10n-id="pref-voice-label"
      style="min-width: 120px; font-weight: bold;"
    ></html:label>
    <html:select
      id="zotero-prefpane-__addonRef__-voice"
      style="flex: 1; min-width: 250px;"
    >
      <html:option value="">Loading...</html:option>
    </html:select>
  </hbox>

  <separator class="thin" />

  <!-- Speed/Rate selector -->
  <hbox align="center">
    <html:label
      data-l10n-id="pref-rate-label"
      style="min-width: 120px; font-weight: bold;"
    ></html:label>
    <html:input
      type="range"
      id="zotero-prefpane-__addonRef__-rate-range"
      min="0.5"
      max="4.0"
      step="0.1"
      value="1.0"
      style="flex: 1; min-width: 200px;"
    ></html:input>
    <html:span
      id="zotero-prefpane-__addonRef__-rate-value"
      style="min-width: 50px; text-align: center; font-weight: bold; font-size: 14px;"
    >1.0x</html:span>
  </hbox>

  <separator class="thin" />

  <!-- Python path -->
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-python-path"
      data-l10n-id="pref-python-path-label"
      style="min-width: 120px; font-weight: bold;"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-python-path"
      placeholder="Auto-detect (leave empty)"
      style="flex: 1; min-width: 250px;"
    ></html:input>
  </hbox>

  <separator class="thin" />

  <!-- Test voice button -->
  <hbox>
    <button
      id="zotero-prefpane-__addonRef__-test-voice"
      data-l10n-id="pref-test-voice"
    />
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
